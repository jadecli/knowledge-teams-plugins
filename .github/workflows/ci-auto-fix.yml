# Thin caller — delegates to jadecli/jadebot's reusable workflow.
# Triggers when CI fails on non-main branches. Claude diagnoses and fixes.
name: CI Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_branch != 'master'
    uses: jadecli/jadebot/.github/workflows/ci-auto-fix.yml@main
    permissions:
      contents: write
      pull-requests: write
      id-token: write
