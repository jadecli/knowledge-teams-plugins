name: CI Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  actions: read

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          use_commit_signing: true
          prompt: |
            The CI workflow failed on branch ${{ github.event.workflow_run.head_branch }}.
            Run ID: ${{ github.event.workflow_run.id }}

            Diagnose and fix the failure:
            1. Run `npm ci`
            2. Run `npm run build` — fix any TypeScript errors
            3. Run `npm test` — fix any test failures

            Only fix what's broken. Don't refactor or improve unrelated code.
            Commit the fix with message "fix: auto-fix CI failure".
          claude_args: |
            --max-turns 5
            --allowedTools Bash,Edit,Write,Read,Glob,Grep
