name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Triage this new issue for jadecli/knowledge-teams-plugins.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            1. Read the issue body and understand the request
            2. Categorize: bug, feature, question, upstream, or infra
            3. Estimate complexity: trivial, small, medium, large
            4. Check if related to existing code (search src/, webmcp/, compose/, extensions/)
            5. Add appropriate labels
            6. Post a brief triage comment with category, complexity, and relevant files

            Do NOT attempt to fix the issue. Triage only.
          claude_args: "--max-turns 3"
