name: Update Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update dependency tracking manifest
        run: |
          set -euo pipefail

          # Read current versions from package.json
          SDK_VERSION=$(node -e "console.log(require('./package.json').dependencies['@anthropic-ai/sdk'].replace('^',''))")
          TWEAKCC_VERSION=$(node -e "console.log(require('./package.json').dependencies['tweakcc'].replace('^',''))")
          ZOD_VERSION=$(node -e "console.log(require('./package.json').dependencies['zod'].replace('^',''))")
          TS_VERSION=$(node -e "console.log(require('./package.json').devDependencies['typescript'].replace('^',''))")
          VITEST_VERSION=$(node -e "console.log(require('./package.json').devDependencies['vitest'].replace('^',''))")

          # Update dependency-tracking.json with current versions
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifests/dependency-tracking.json', 'utf8'));
            manifest.generatedAt = new Date().toISOString();
            manifest.production['@anthropic-ai/sdk'].currentVersion = '${SDK_VERSION}';
            manifest.production['tweakcc'].currentVersion = '${TWEAKCC_VERSION}';
            manifest.production['zod'].currentVersion = '${ZOD_VERSION}';
            manifest.development['typescript'].currentVersion = '${TS_VERSION}';
            manifest.development['vitest'].currentVersion = '${VITEST_VERSION}';
            fs.writeFileSync('manifests/dependency-tracking.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Update Stainless feature counts
        run: |
          set -euo pipefail

          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifests/stainless-features.json', 'utf8'));
            const features = Object.values(manifest.features);
            manifest.summary.total = features.length;
            manifest.summary.implemented = features.filter(f => f.implemented).length;
            manifest.summary.notImplemented = features.filter(f => !f.implemented).length;
            manifest.summary.percentComplete = Math.round((manifest.summary.implemented / manifest.summary.total) * 100);
            manifest.generatedAt = new Date().toISOString();
            fs.writeFileSync('manifests/stainless-features.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Check for manifest changes
        id: changes
        run: |
          if git diff --quiet manifests/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated manifests
        if: github.event_name == 'push' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/
          git commit -m "chore(manifests): auto-update dependency and feature manifests"
          git push

      - name: Post manifest diff on PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const diff = execSync('git diff manifests/', { encoding: 'utf8' });
            if (!diff) return;

            const body = `### Manifest Changes Detected\n\n\`\`\`diff\n${diff.slice(0, 3000)}\n\`\`\`\n\n> Auto-generated by manifests-update workflow`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
