name: Dependency Updates

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 08:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          OUTDATED=$(npm outdated --json 2>/dev/null || true)
          if [ "$OUTDATED" = "{}" ] || [ -z "$OUTDATED" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "All packages are up to date."
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "$OUTDATED" > /tmp/outdated.json
            echo "Outdated packages:"
            echo "$OUTDATED" | jq -r 'to_entries[] | "\(.key): \(.value.current) → \(.value.wanted) (latest: \(.value.latest))"'
          fi

      - name: Detect major version bumps
        if: steps.outdated.outputs.has_updates == 'true'
        id: majors
        run: |
          MAJORS=$(jq -r 'to_entries[] | select(.value.current != .value.wanted and (.value.latest | split(".")[0]) != (.value.current | split(".")[0])) | .key' /tmp/outdated.json || true)
          if [ -n "$MAJORS" ]; then
            echo "has_majors=true" >> "$GITHUB_OUTPUT"
            echo "major_packages=$MAJORS" >> "$GITHUB_OUTPUT"
            echo "Major version bumps detected: $MAJORS"
          else
            echo "has_majors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply semver-compatible updates
        if: steps.outdated.outputs.has_updates == 'true'
        run: npm update

      - name: Build after update
        if: steps.outdated.outputs.has_updates == 'true'
        id: build
        run: npm run build
        continue-on-error: true

      - name: Test after update
        if: steps.outdated.outputs.has_updates == 'true' && steps.build.outcome == 'success'
        id: test
        run: npm test
        continue-on-error: true

      - name: Create update PR (semver-compatible)
        if: steps.outdated.outputs.has_updates == 'true' && steps.build.outcome == 'success' && steps.test.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if package-lock.json actually changed
          if git diff --quiet package-lock.json; then
            echo "No lock file changes after npm update."
            exit 0
          fi

          BRANCH="auto/deps-update-$(date -u +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: update dependencies (semver-compatible)

          $(npm outdated --json 2>/dev/null | jq -r 'to_entries[] | "\(.key): \(.value.current) → \(.value.wanted)"' || echo 'see diff')"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: dependency updates $(date -u +%Y-%m-%d)" \
            --body "## Dependency Updates (semver-compatible)

          Build: ${{ steps.build.outcome }}
          Tests: ${{ steps.test.outcome }}

          All updates are within semver range. Auto-generated by deps-update workflow." \
            --base main

      - name: Open issue for build/test failures
        if: steps.outdated.outputs.has_updates == 'true' && (steps.build.outcome == 'failure' || steps.test.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Dependency update failure $(date -u +%Y-%m-%d)" \
            --body "## Dependency Update Failed

          **Build:** ${{ steps.build.outcome }}
          **Tests:** ${{ steps.test.outcome }}

          Semver-compatible \`npm update\` caused failures. Manual review required.

          Run \`npm outdated --json\` locally to inspect." \
            --label "dependencies"

      - name: Open issue for major version bumps
        if: steps.majors.outputs.has_majors == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Major dependency updates available $(date -u +%Y-%m-%d)" \
            --body "## Major Version Bumps Available

          The following packages have major version updates that require manual review:

          \`\`\`
          ${{ steps.majors.outputs.major_packages }}
          \`\`\`

          **Why manual?** Major versions may contain breaking changes (e.g. zod v3→v4).
          Review changelogs and test locally before upgrading." \
            --label "dependencies"
