# Thin caller — delegates to jadecli/jadebot's reusable workflow.
# No secrets needed. Claude GitHub App handles auth org-wide.
name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    uses: jadecli/jadebot/.github/workflows/code-review.yml@main
    permissions:
      contents: read
      pull-requests: write
      id-token: write
