name: Blog Crawl

on:
  schedule:
    # Run every Sunday at 6am UTC — weekly cadence for customer blog posts
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      concurrency:
        description: 'Number of concurrent crawl workers'
        required: false
        default: '5'

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Sync customer blog posts to Neon cache
        run: npm run blog:sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The blog crawl just ran (npm run blog:sync). Check the output for errors.

            If there were significant failures (>10% of 188 posts failed):
            1. Create a GitHub issue titled "blog-crawl: YYYY-MM-DD — crawl failures"
            2. Label it: maintenance, blog-crawler
            3. List which URLs failed and any error patterns

            If the crawl was clean, do nothing — no issue needed.
          claude_args: "--max-turns 3"
          show_full_output: true
